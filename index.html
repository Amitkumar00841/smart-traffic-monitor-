
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Smart Traffic Monitor — UI Prototype</h1>
    </header>

    <section class="container">

        <div class="panel">
            <h2>Controls</h2>

            <label>Server URL</label>
            <input type="text" id="serverUrl" value="http://localhost:5000">

            <label>Upload Video</label>
            <input type="file" id="videoFile" accept="video/*">

            <div class="btn-row">
                <button id="startBtn">Start Detection</button>
                <button id="stopBtn">Stop</button>
                <button id="downloadBtn">Download Log</button>
            </div>

            <p class="status">Status: <span id="statusText">Idle</span></p>
        </div>

        <div class="panel">
            <h2>Violations Log</h2>
            <table id="logTable">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Plate</th>
                        <th>Violation</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <tr><td colspan="3">No data yet</td></tr>
                </tbody>
            </table>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
